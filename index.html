<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>.apocalipse.</title>
</head>
<body>

<header>
   <h1>APOCALIPSE</h1>
   <p>SOBREVIVA SE FOR CAPAZ</p>
   <P>TEMPO CRONOMETRO: <span id="tempo">00:00:00</span></P>
</header>

<main>

 <div id="painelEvento">
    <p id="textoEvento"> Click em explorar...</p>
 </div>


<div class="sitema">

    <div>
    <p>vida</p>
    <div class="barra"><div id="vidabarra"></div></div>
    </div>


    <div>
    <p>sede</p>
    <div class="barra"><div id="sedebarra"></div></div>
    </div>

    <div>
    <p>fome</p>
    <div class="barra"><div id="fomebarra"></div></div>
    </div>

</div>

<div class="acoes">
    <button id="Explora" onclick="explorar()">Explorar</button>
    <button onclick="Comer()">Comer</button>
    <button onclick="Beber()">Beber</button>
    <button onclick="Descansar()">Descansar</button>
</div>
<button class="meubotao" onclick="abrieinventario()">Inventário</button>

<div id="inventario" class="tela">
<h5 class="intentory">INVENTÁRIO</h5>
<div id="inventario1">
    <p>Madeira: <span id="madeiraQtd">0</span> 🧱</p>
    <p>Pedra: <span id="pedraQtd">0</span> 🗿</p>
    <p>Sucata: <span id="metalQtd">0</span> ⚙️</p>
</div>
<div id="inventario2">
    <p>Comida: <span id="comidaQtd">0</span> 🍎</p>
    <p>Água: <span id="aguaQtd">0</span> 💧</p>
    <p>Remédio: <span id="remedioQtd">0</span> 💊</p>
</div>
<button class="meubotao2" onclick="fecharinventario()">Fechar</button>
</div>

</main>

    <script src="script.js"></script>
</body>
</html>
